<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMessage Relationship Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', Consolas, Monaco, monospace;
            background: #000000;
            min-height: 100vh;
            padding: 16px;
            color: #00cc88;
            line-height: 1.4;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 24px;
            padding: 12px 0;
            border-bottom: 1px solid #00cc88;
        }

        h1 {
            font-size: 1.5em;
            margin-bottom: 4px;
            color: #00cc88;
            font-weight: normal;
        }

        h1::before {
            content: "$ ";
            color: #00cc88;
        }

        .subtitle {
            font-size: 0.85em;
            color: #008866;
            font-weight: normal;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 8px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #000000;
            border: 1px solid #00cc88;
            padding: 8px 12px;
            transition: background 0.2s ease;
        }

        .stat-card:hover {
            background: #001a11;
        }

        .stat-value {
            font-size: 1.5em;
            color: #00cc88;
            margin-bottom: 2px;
        }

        .stat-label {
            color: #008866;
            font-size: 0.75em;
            text-transform: uppercase;
        }

        .contact-grid {
            display: grid;
            gap: 8px;
        }

        .contact-card {
            background: #000000;
            border: 1px solid #00cc88;
            padding: 12px;
            transition: background 0.1s ease;
        }

        .contact-card:hover {
            background: #001a11;
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid #004433;
        }

        .contact-name {
            font-size: 1.1em;
            color: #00cc88;
        }

        .contact-name::before {
            content: "> ";
        }

        .rank {
            background: #000000;
            color: #008866;
            padding: 2px 8px;
            font-size: 0.85em;
            border: 1px solid #008866;
        }

        .contact-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
            margin-bottom: 8px;
        }

        .stat {
            padding: 6px;
            background: #000000;
            border: 1px solid #004433;
        }

        .stat-number {
            font-size: 1em;
            color: #00cc88;
        }

        .stat-description {
            font-size: 0.7em;
            color: #008866;
            margin-top: 2px;
        }

        .progress-section {
            margin-top: 8px;
        }

        .progress-label {
            font-size: 0.75em;
            color: #008866;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            background: #001a11;
            border: 1px solid #004433;
            height: 6px;
            overflow: hidden;
            margin-bottom: 6px;
        }

        .progress-fill {
            background: #00cc88;
            height: 100%;
            transition: width 0.5s ease;
        }

        .streak-badge {
            display: inline-block;
            background: #000000;
            color: #00cc88;
            padding: 4px 8px;
            font-size: 0.75em;
            margin-top: 6px;
            border: 1px solid #008866;
        }

        .loading {
            text-align: center;
            color: #008866;
            font-size: 1em;
            padding: 40px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.2em;
            }

            .contact-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 iMessage Relationship Stats</h1>
            <p class="subtitle">Top 25 Contacts • 1-on-1 Conversations Only</p>
        </header>

        <div class="stats-overview" id="overview">
            <div class="stat-card">
                <div class="stat-value" id="total-messages">-</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-sessions">-</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-response">-</div>
                <div class="stat-label">Avg Response Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="longest-streak">-</div>
                <div class="stat-label">Longest Streak</div>
            </div>
        </div>

        <div class="contact-grid" id="contacts">
            <div class="loading">Loading your stats...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.sample.json');
                const contacts = await response.json();

                displayOverview(contacts);
                displayContacts(contacts);
            } catch (error) {
                document.getElementById('contacts').innerHTML =
                    '<div class="loading">Error loading data. Please make sure data.sample.json is present.</div>';
            }
        }

        function displayOverview(contacts) {
            const totalMessages = contacts.reduce((sum, c) => sum + c.total_messages, 0);
            const totalSessions = contacts.reduce((sum, c) => sum + c.sessions, 0);

            const avgResponseTimes = contacts
                .filter(c => c.my_median_response_time)
                .map(c => c.my_median_response_time);
            const avgResponse = avgResponseTimes.length > 0
                ? avgResponseTimes.reduce((a, b) => a + b, 0) / avgResponseTimes.length
                : 0;

            const longestStreak = Math.max(...contacts.map(c => c.longest_streak || 0));

            document.getElementById('total-messages').textContent = totalMessages.toLocaleString();
            document.getElementById('total-sessions').textContent = totalSessions.toLocaleString();
            document.getElementById('avg-response').textContent = avgResponse > 0
                ? `${(avgResponse / 60).toFixed(1)}m`
                : '-';
            document.getElementById('longest-streak').textContent = `${longestStreak}d`;
        }

        function displayContacts(contacts) {
            const container = document.getElementById('contacts');
            container.innerHTML = '';

            contacts.forEach(contact => {
                const card = document.createElement('div');
                card.className = 'contact-card';

                const messageRatio = contact.message_ratio ? (contact.message_ratio * 100).toFixed(1) : 0;
                const initiatorRatio = contact.initiator_ratio ? (contact.initiator_ratio * 100).toFixed(1) : 0;
                const myResponseTime = contact.my_median_response_time
                    ? (contact.my_median_response_time / 60).toFixed(1)
                    : '-';
                const theirResponseTime = contact.their_median_response_time
                    ? (contact.their_median_response_time / 60).toFixed(1)
                    : '-';

                card.innerHTML = `
                    <div class="contact-header">
                        <div class="contact-name">${contact.name}</div>
                        <div class="rank">${contact.rank}</div>
                    </div>
                    <div class="contact-stats">
                        <div class="stat">
                            <div class="stat-number">${contact.total_messages.toLocaleString()}</div>
                            <div class="stat-description">Messages</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${contact.sessions}</div>
                            <div class="stat-description">Sessions</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${myResponseTime}m</div>
                            <div class="stat-description">Your Response</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${theirResponseTime}m</div>
                            <div class="stat-description">Their Response</div>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>You send messages</span>
                            <span>${messageRatio}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${messageRatio}%"></div>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>They start conversations</span>
                            <span>${initiatorRatio}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${initiatorRatio}%"></div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <span class="streak-badge">
                            ${contact.current_streak}d streak (best: ${contact.longest_streak}d)
                        </span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Load data when page loads
        loadData();
    </script>
</body>
</html>
