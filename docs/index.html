<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMessage Relationship Stats</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            padding: 20px;
            color: #c9d1d9;
            line-height: 1.5;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 48px;
            padding: 32px 0;
            border-bottom: 1px solid #21262d;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            color: #f0f6fc;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1em;
            color: #8b949e;
            font-weight: 400;
        }

        .stats-overview {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 16px;
            text-align: center;
            transition: border-color 0.2s ease;
        }

        .stat-card:hover {
            border-color: #58a6ff;
        }

        .stat-value {
            font-size: 2em;
            font-weight: 600;
            color: #58a6ff;
            margin-bottom: 4px;
        }

        .stat-label {
            color: #8b949e;
            font-size: 0.875em;
            text-transform: none;
            letter-spacing: 0;
        }

        .contact-grid {
            display: grid;
            gap: 16px;
        }

        .contact-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 24px;
            transition: border-color 0.2s ease, transform 0.1s ease;
        }

        .contact-card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }

        .contact-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 16px;
            border-bottom: 1px solid #21262d;
        }

        .contact-name {
            font-size: 1.25em;
            font-weight: 600;
            color: #f0f6fc;
        }

        .rank {
            background: #21262d;
            color: #8b949e;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.875em;
            border: 1px solid #30363d;
        }

        .contact-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 16px;
            margin-bottom: 16px;
        }

        .stat {
            text-align: center;
            padding: 8px;
            background: #0d1117;
            border-radius: 6px;
            border: 1px solid #21262d;
        }

        .stat-number {
            font-size: 1.25em;
            font-weight: 600;
            color: #58a6ff;
        }

        .stat-description {
            font-size: 0.75em;
            color: #8b949e;
            margin-top: 4px;
        }

        .progress-section {
            margin-top: 16px;
        }

        .progress-label {
            font-size: 0.875em;
            color: #8b949e;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }

        .progress-bar {
            background: #21262d;
            border-radius: 6px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .progress-fill {
            background: #58a6ff;
            height: 100%;
            transition: width 0.5s ease;
            border-radius: 6px;
        }

        .streak-badge {
            display: inline-block;
            background: #21262d;
            color: #f0f6fc;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.875em;
            font-weight: 500;
            margin-top: 8px;
            border: 1px solid #30363d;
        }

        .streak-badge::before {
            content: "🔥 ";
        }

        .loading {
            text-align: center;
            color: #8b949e;
            font-size: 1.25em;
            padding: 50px;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }

            .contact-stats {
                grid-template-columns: 1fr 1fr;
            }

            .stats-overview {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💬 iMessage Relationship Stats</h1>
            <p class="subtitle">Top 25 Contacts • 1-on-1 Conversations Only</p>
        </header>

        <div class="stats-overview" id="overview">
            <div class="stat-card">
                <div class="stat-value" id="total-messages">-</div>
                <div class="stat-label">Total Messages</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="total-sessions">-</div>
                <div class="stat-label">Total Sessions</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="avg-response">-</div>
                <div class="stat-label">Avg Response Time</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="longest-streak">-</div>
                <div class="stat-label">Longest Streak</div>
            </div>
        </div>

        <div class="contact-grid" id="contacts">
            <div class="loading">Loading your stats...</div>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('data.sample.json');
                const contacts = await response.json();

                displayOverview(contacts);
                displayContacts(contacts);
            } catch (error) {
                document.getElementById('contacts').innerHTML =
                    '<div class="loading">Error loading data. Please make sure data.sample.json is present.</div>';
            }
        }

        function displayOverview(contacts) {
            const totalMessages = contacts.reduce((sum, c) => sum + c.total_messages, 0);
            const totalSessions = contacts.reduce((sum, c) => sum + c.sessions, 0);

            const avgResponseTimes = contacts
                .filter(c => c.my_median_response_time)
                .map(c => c.my_median_response_time);
            const avgResponse = avgResponseTimes.length > 0
                ? avgResponseTimes.reduce((a, b) => a + b, 0) / avgResponseTimes.length
                : 0;

            const longestStreak = Math.max(...contacts.map(c => c.longest_streak || 0));

            document.getElementById('total-messages').textContent = totalMessages.toLocaleString();
            document.getElementById('total-sessions').textContent = totalSessions.toLocaleString();
            document.getElementById('avg-response').textContent = avgResponse > 0
                ? `${(avgResponse / 60).toFixed(1)}m`
                : '-';
            document.getElementById('longest-streak').textContent = `${longestStreak}d`;
        }

        function displayContacts(contacts) {
            const container = document.getElementById('contacts');
            container.innerHTML = '';

            contacts.forEach(contact => {
                const card = document.createElement('div');
                card.className = 'contact-card';

                const messageRatio = contact.message_ratio ? (contact.message_ratio * 100).toFixed(1) : 0;
                const initiatorRatio = contact.initiator_ratio ? (contact.initiator_ratio * 100).toFixed(1) : 0;
                const myResponseTime = contact.my_median_response_time
                    ? (contact.my_median_response_time / 60).toFixed(1)
                    : '-';
                const theirResponseTime = contact.their_median_response_time
                    ? (contact.their_median_response_time / 60).toFixed(1)
                    : '-';

                card.innerHTML = `
                    <div class="contact-header">
                        <div class="contact-name">${contact.name}</div>
                        <div class="rank">${contact.rank}</div>
                    </div>
                    <div class="contact-stats">
                        <div class="stat">
                            <div class="stat-number">${contact.total_messages.toLocaleString()}</div>
                            <div class="stat-description">Messages</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${contact.sessions}</div>
                            <div class="stat-description">Sessions</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${myResponseTime}m</div>
                            <div class="stat-description">Your Response</div>
                        </div>
                        <div class="stat">
                            <div class="stat-number">${theirResponseTime}m</div>
                            <div class="stat-description">Their Response</div>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>You send messages</span>
                            <span>${messageRatio}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${messageRatio}%"></div>
                        </div>
                    </div>
                    <div class="progress-section">
                        <div class="progress-label">
                            <span>They start conversations</span>
                            <span>${initiatorRatio}%</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${initiatorRatio}%"></div>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <span class="streak-badge">
                            ${contact.current_streak}d streak (best: ${contact.longest_streak}d)
                        </span>
                    </div>
                `;

                container.appendChild(card);
            });
        }

        // Load data when page loads
        loadData();
    </script>
</body>
</html>
